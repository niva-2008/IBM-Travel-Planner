
   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Planner Agent</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #eef2f7; padding: 50px; margin: 0; }
        .container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1e40af; margin-bottom: 10px; }
        p { color: #475569; font-size: 1.1rem; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="root"></div>

    <div class="container">
        <h1>AI Travel Planner Agent</h1>
        <p>This intelligent assistant was built using <strong>IBM Granite</strong> and <strong>IBM Watsonx Orchestrate</strong> for the AICTE Edunet 4-Week Virtual Internship.</p>
        <p>Click the chat bubble icon in the bottom-right corner of this screen to plan your trip itineraries and check budget costs dynamically!</p>
    </div>

    <script>
      // 1. Configure the agent layout parameters
      window.wxOConfiguration = {
        orchestrationID: "864430bc", 
        hostURL: "https://dl.watson-orchestrate.ibm.com",
        rootElementID: "root",
        showLauncher: true, 
        chatOptions: {
          agentId: "864430bc",
          agentEnvironmentId: "864430bc"
        }
      };

      // 2. Wait until the entire webpage is completely loaded before fetching the widget
      window.addEventListener('DOMContentLoaded', (event) => {
          const script = document.createElement("script");
          script.src = "https://dl.watson-orchestrate.ibm.com/wxochat/wxoLoader.js?embed=true";
          script.crossOrigin = "anonymous";
          script.addEventListener("load", function () {
              if (typeof wxoLoader !== 'undefined') {
                  wxoLoader.init();
              }
          });
          document.head.appendChild(script);
      });
    </script>

</body>
</html>
